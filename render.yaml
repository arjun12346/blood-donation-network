services:
  # Backend API Service
  - type: web
    name: blood-donation-api
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: cd blood-donation-network/backend && npm install
    startCommand: cd blood-donation-network/backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://blood-donation-web.onrender.com
      - key: APP_VERSION
        value: 2.0.0
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 200
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: AUTH_RATE_LIMIT_MAX
        value: 30

  # Frontend Web Service
  - type: web
    name: blood-donation-web
    runtime: static
    region: singapore
    plan: free
    branch: main
    buildCommand: cd blood-donation-network/frontend && npm install && npm run build
    staticPublishPath: ./blood-donation-network/frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://blood-donation-api.onrender.com/api

